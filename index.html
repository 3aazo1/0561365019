<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>عبدالعزيز خليفة · تواصل معي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: #0a0a0f;
        }

        /* ===== فيديو الخلفية (تشغيل تلقائي، مكرر، بدون صوت) ===== */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            background: #1a1a2e;
        }

        /* طبقة تراكب خفيفة جداً فوق الفيديو لتحسين وضوح النص */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
            pointer-events: none;
        }

        /* ===== حاوية الهاتف (شفافة جداً مع تمويه خفيف) ===== */
        .phone-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px) saturate(160%);
            -webkit-backdrop-filter: blur(10px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 44px 28px 40px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== الصورة الشخصية ===== */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 18px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            display: block;
        }

        /* الحلقة الضوئية المتوهجة */
        .profile-wrapper::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg, #f093fb, #f5576c, #4facfe, #43e97b, #f093fb);
            background-size: 300% 300%;
            animation: spinGlow 6s linear infinite;
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
            z-index: -1;
        }

        @keyframes spinGlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== النصوص ===== */
        h1 {
            color: #ffffff;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* ===== الأزرار ===== */
        .buttons-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-3d {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 20px 18px;
            font-size: 19px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            border: none;
            border-radius: 20px;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            letter-spacing: 0.3px;
            overflow: hidden;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-3d i {
            font-size: 24px;
            transition: transform 0.2s ease;
        }

        .btn-wa {
            background: linear-gradient(145deg, #2ad06b, #1ea85a);
            box-shadow: 0 8px 0 #0f7a42, 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .btn-call {
            background: linear-gradient(145deg, #5b8cff, #3b6ad9);
            box-shadow: 0 8px 0 #1f49a0, 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .btn-3d:active {
            transform: translateY(6px) scale(0.97);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }

        @media (hover: hover) {
            .btn-3d:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15), 0 20px 40px rgba(0, 0, 0, 0.3);
            }
            .btn-3d:hover i {
                transform: scale(1.1) rotate(-4deg);
            }
            .btn-wa:hover {
                background: linear-gradient(145deg, #36e07a, #23b85f);
                box-shadow: 0 10px 0 #0f7a42, 0 20px 50px rgba(37, 211, 102, 0.4);
            }
            .btn-call:hover {
                background: linear-gradient(145deg, #6f9bff, #4a7ae6);
                box-shadow: 0 10px 0 #1f49a0, 0 20px 50px rgba(59, 130, 246, 0.4);
            }
        }

        .btn-3d::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 70%);
            pointer-events: none;
        }

        .btn-3d .btn-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== استجابة للشاشات الصغيرة ===== */
        @media (max-width: 420px) {
            .phone-container {
                padding: 32px 18px 32px;
                border-radius: 32px;
            }
            .profile-img {
                width: 100px;
                height: 100px;
            }
            h1 {
                font-size: 26px;
            }
            .btn-3d {
                font-size: 17px;
                padding: 18px 14px;
                gap: 12px;
            }
            .btn-3d i {
                font-size: 20px;
            }
        }

        .btn-3d:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.6);
            outline-offset: 3px;
        }
    </style>
</head>
<body>

    <!-- ===== فيديو الخلفية (تم تعديل اسم الملف إلى Makkah) ===== -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Makkah.mp4" type="video/mp4">
        <!-- يمكنك إضافة صيغ إضافية مثل WebM للتوافق -->
        <!-- <source src="Makkah.webm" type="video/webm"> -->
        متصفحك لا يدعم تشغيل الفيديو.
    </video>

    <!-- طبقة تراكب خفيفة -->
    <div class="overlay"></div>

    <div class="phone-container">

        <!-- الصورة الشخصية مع الحلقة المتوهجة -->
        <div class="profile-wrapper">
            <img src="my-pic.jpg" alt="عبدالعزيز خليفة" class="profile-img" />
        </div>

        <h1>عبدالعزيز خليفة</h1>
        <p class="subtitle">تواصل معي مباشرة</p>

        <div class="buttons-list">

            <!-- زر واتساب -->
            <a href="https://wa.me/966561365019" class="btn-3d btn-wa" target="_blank" rel="noopener">
                <i class="fa-brands fa-whatsapp"></i>
                <span class="btn-label">مراسلة واتساب</span>
            </a>

            <!-- زر اتصال مباشر -->
            <a href="tel:0561365019" class="btn-3d btn-call">
                <i class="fa-solid fa-phone"></i>
                <span class="btn-label">اتصال مباشر</span>
            </a>

        </div>
    </div>

</body>
</html>
